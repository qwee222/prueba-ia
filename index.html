<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Protección No Index: Bloquea buscadores y bots de rastreo -->
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Página de Verificación</title>
    
    <!-- Cloudflare Turnstile en modo compatibilidad -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?compat=recaptcha" async defer></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body, html { 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #000; 
            color: white; 
        }

        /* Contenedor del Video de IA */
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Mantiene el video a pantalla completa sin bandas negras */
            filter: brightness(0.4) contrast(1.1); /* Mejora el contraste y oscurece para leer el texto */
        }

        /* Capa de interfaz (Glassmorphism) */
        .overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: 380px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        h1 { font-size: 1.8rem; margin-bottom: 25px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .btn-group { display: flex; gap: 15px; justify-content: center; }
        
        .btn {
            padding: 14px 0;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 130px;
        }

        .btn-yes { background: #00ff88; color: #000; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); }
        .btn-no { background: rgba(255, 255, 255, 0.1); color: white; }
        
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }
        .btn-yes:hover { box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5); }

        #captcha-section { display: none; }

        /* Ajuste para que el widget de Cloudflare se vea bien */
        .cf-turnstile {
            margin: 20px auto 0;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <!-- Video desde la URL de Videy proporcionada -->
        <video autoplay muted loop playsinline id="bg-video">
            <source src="https://cdn.videy.co/pEvKWO9U1.mp4" type="video/mp4">
        </video>
    </div>

    <div class="overlay">
        <!-- PASO 1 -->
        <div class="glass-card" id="step-1">
            <h1>¿Estás interesado?</h1>
            <div class="btn-group">
                <button class="btn btn-yes" onclick="showCaptcha()">SÍ</button>
                <button class="btn btn-no" onclick="location.href='https://google.com'">NO</button>
            </div>
        </div>

        <!-- PASO 2 (Oculto hasta hacer clic en SÍ) -->
        <div class="glass-card" id="captcha-section">
            <h1>Verificación</h1>
            <p style="font-size: 0.95rem; color: #eee; margin-bottom: 5px;">Completa el paso de seguridad:</p>
            
            <form id="form-verificar" action="verificar.php" method="POST">
                <!-- Widget con tu Site Key proporcionada -->
                <div class="g-recaptcha" 
                     data-sitekey="0x4AAAAAAC4pl_Jt0-462uRy" 
                     data-callback="onCaptchaSuccess"
                     data-theme="dark"></div>
            </form>
        </div>
    </div>

    <script>
        function showCaptcha() {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('captcha-section').style.display = 'block';
        }

        function onCaptchaSuccess(token) {
            // Envío automático al archivo verificar.php
            setTimeout(function() {
                document.getElementById('form-verificar').submit();
            }, 800);
        }
    </script>

</body>
</html>
