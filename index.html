<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <title>Verificación de Seguridad</title>
    
    <!-- Script en modo compatibilidad como pediste -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?compat=recaptcha" async defer></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; color: #fff; }

        /* Video de fondo IA - Responsive */
        #video-viewport {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        #bg-video {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.5) blur(2px);
        }

        .main-card {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; padding: 20px;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        
        .btn-container { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
        
        .action-btn {
            padding: 12px 30px; border-radius: 10px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            font-size: 1rem; width: 100px;
        }

        .yes { background: #00ff88; color: #000; }
        .no { background: #ff4b2b; color: #fff; }
        .action-btn:hover { transform: scale(1.05); opacity: 0.9; }

        #captcha-step { display: none; margin-top: 20px; }
        
        /* Ajuste para móviles */
        @media (max-width: 480px) {
            h1 { font-size: 1.4rem; }
            .glass-box { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="video-viewport">
        <!-- Reemplaza el src con tu video de IA -->
        <video autoplay muted loop playsinline id="bg-video">
            <source src="TU_VIDEO_AQUÍ.mp4" type="video/mp4">
        </video>
    </div>

    <div class="main-card">
        <div class="glass-box" id="step-1">
            <h1>¿Estás interesado en ver el contenido?</h1>
            <div class="btn-container">
                <button class="action-btn yes" onclick="showCaptcha()">SÍ</button>
                <button class="action-btn no" onclick="location.reload()">NO</button>
            </div>
        </div>

        <div class="glass-box" id="captcha-step">
            <h1>Verifica tu acceso</h1>
            <p style="margin-bottom: 20px; font-size: 0.9rem;">Haz clic abajo para confirmar que no eres un bot.</p>
            
            <!-- Turnstile Widget con tu Site Key -->
            <div class="g-recaptcha" 
                 data-sitekey="0x4AAAAAAC4pl_Jt0-462uRy" 
                 data-callback="handleSuccess"
                 data-theme="dark"></div>
        </div>
    </div>

    <script>
        function showCaptcha() {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('captcha-step').style.display = 'block';
        }

        function handleSuccess(token) {
            // Ofuscación básica para que no sea obvio a dónde va el usuario
            const target = "aHR0cHM6Ly90dWRvbWluaW8uY29tL29mZXJ0YQ=="; // URL en Base64
            setTimeout(() => {
                window.location.href = atob(target) + "?v=" + token;
            }, 500);
        }
    </script>
</body>
</html>
