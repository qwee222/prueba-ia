<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido | Contenido Exclusivo</title>
    <!-- SEO y Protección -->
    <meta name="description" content="Accede a nuestro portal de contenido multimedia.">
    <meta name="robots" content="index, follow"> <!-- Facebook necesita ver esto indexado -->

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        body {
            background-color: #111;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px 20px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #fff;
        }

        p {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .enter-btn {
            display: inline-block;
            background-color: #00ff88;
            color: #000;
            padding: 18px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4);
        }

        .enter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0, 255, 136, 0.6);
            background-color: #00e67a;
        }

        .features {
            margin-top: 50px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            font-size: 0.9rem;
            color: #666;
        }

        .feature-item {
            padding: 15px;
            border: 1px solid #222;
            border-radius: 10px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .logo { font-size: 1.8rem; }
            h1 { font-size: 1.4rem; }
            .features { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">PORTAL VIP</div>
        
        <h1>Acceso a Contenido Multimedia</h1>
        <p>Estás a un paso de acceder a nuestra plataforma exclusiva. Haz clic en el botón de abajo para verificar tu acceso y continuar.</p>

        <!-- Este botón redirige a la landing del video/captcha -->
        <a href="verificar.html" class="enter-btn">ENTRAR AHORA</a>

        <div class="features">
            <div class="feature-item">
                🔒 Conexión Segura SSL
            </div>
            <div class="feature-item">
                ⚡ Carga Ultra Rápida
            </div>
        </div>
    </div>

</body>
</html>
