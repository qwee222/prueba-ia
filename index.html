<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Protección No Index -->
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Página de Verificación</title>
    
    <!-- Cloudflare Turnstile (Captcha Invisible/No intrusivo) -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; color: white; }

        /* Video de fondo responsivo */
        #bg-video {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1; filter: brightness(0.4);
            object-fit: cover;
        }

        .container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; text-align: center;
            padding: 20px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        
        .btn-group { display: flex; gap: 20px; margin-top: 20px; }
        
        .btn {
            padding: 15px 40px; font-size: 1.2rem; border: none;
            border-radius: 50px; cursor: pointer; transition: 0.3s;
            font-weight: bold; text-decoration: none;
        }

        .btn-yes { background: #25d366; color: white; }
        .btn-no { background: #ff4b2b; color: white; }
        
        /* Oculto inicialmente */
        #captcha-section { display: none; margin-top: 20px; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://cdn.videy.co/pEvKWO9U1.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div id="step-1">
            <h1>¿Estás interesado?</h1>
            <div class="btn-group">
                <button class="btn btn-yes" onclick="showCaptcha()">SÍ</button>
                <button class="btn btn-no" onclick="alert('Gracias por visitarnos.')">NO</button>
            </div>
        </div>

        <div id="step-2" style="display: none;">
            <h1>Verifica que eres humano</h1>
            <p>Para continuar, completa el siguiente paso:</p>
            <div id="captcha-section" style="display: block;">
                <!-- Widget de Cloudflare Turnstile -->
                <div class="cf-turnstile" data-sitekey="TU_SITE_KEY_DE_CLOUDFLARE" data-callback="onSuccess"></div>
            </div>
        </div>
    </div>

    <script>
        function showCaptcha() {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }

        function onSuccess(token) {
            // Aquí rediriges a la oferta real o al siguiente paso
            window.location.href = "TU_PAGINA_FINAL.html?token=" + token;
        }
    </script>
</body>
</html>
